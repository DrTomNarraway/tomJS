
<!DOCTYPE html>
<html>
<body>
    <script src="jatos.js" id="jatos"></script>
    <script src="tomJS_dev.js" id="tomJS"></script>
    <script>
        
        const args = {
            'fullscreen': false,
            'gridlines': false,
            'verbose': true,
            'show_time' : false,
        };

        const tomJS = new Experiment(args);

        const tap = new Nodes.TapCollector();

        if (jatos.constructor != HTMLScriptElement) jatos.onConnected(() => { tomJS.connectToJatos(false) });

        const CBG = tomJS.getCounterbalanceGroup();

        // constants

        const FR_BLOCKWISE = {};

        const FR_TRIALWISE = {
            'gabor_ori': [2, 358]
        };

        const FR_ADDITIONAL = {     
            'condition': 'FR',
            'gabor_contrast': 0.03,
            'stimulus': Stimuli.Gabor,
            'iti_duration': [650, 750, 850],
            'trial_type': Trials.Trial
        };

        const FR_CONDITIONAL = [
            'if (gabor_ori > 180) target = A',
            'if (gabor_ori < 180) target = B',
        ];

        const FR_ATTENTION = [
            {
                'condition': 'FR',
                'feedback_texts': {
                    'Correct': 'Pass',
                    'Incorrect': 'Fail', 'Fast': 'Fail', 'Slow': 'Fail', 'Censored': 'Fail'
                },
                'gabor_contrast': 1.00,
                'gabor_ori': 5,
                'stimulus': Stimuli.Gabor,
                'target': 'B',
                'trial_type': Trials.Trial
            },
            {
                'condition': 'FR',
                'feedback_texts': {
                    'Correct': 'Pass',
                    'Incorrect': 'Fail', 'Fast': 'Fail', 'Slow': 'Fail', 'Censored': 'Fail'
                },
                'gabor_contrast': 1.00,
                'gabor_ori': 355,
                'stimulus': Stimuli.Gabor,
                'target': 'A',
                'trial_type': Trials.Trial
            }
        ];

        const FR_BLOCK = {
            'blockwise':        FR_BLOCKWISE,
            'trialwise':        FR_TRIALWISE,
            'additional':       FR_ADDITIONAL,
            'conditional':      FR_CONDITIONAL,
            'attention':        FR_ATTENTION,
            'trial_reps':       12,
            'start_slide':      null,
            'end_slide':        null,
            'add_countdown':    true
        };

        const RS_BLOCKWISE = {};

        const RS_TRIALWISE = {
            'condition': [0, 500, 1000],
            'gabor_ori': [2, 358]
        };

        const RS_ADDITIONAL = {        
            'gabor_contrast': 0.03,
            'stimulus': Stimuli.Gabor,
            'iti_duration': [650, 750, 850],
            'signal': Stimuli.NecroDancerBar,
            'signal_for': 300,
            'trial_type': Trials.ProgressBarResponseSignal
        };

        const RS_CONDITIONAL = [
            'if (gabor_ori > 180) target = A',
            'if (gabor_ori < 180) target = B',
            'if (condition == 0) fixation_duration = 1500',
            'if (condition == 500) fixation_duration = 1000',
            'if (condition == 1000) fixation_duration = 500',
        ];

        const RS_ATTENTION = [
            {
                'condition': 0,
                'fixation_duration': 0,
                'feedback_texts': {
                    'Correct': 'Pass',
                    'Incorrect':'Fail','Fast':'Fail','Slow':'Fail','Censored':'Fail'
                },
                'gabor_contrast': 1.00,
                'gabor_ori': 5,
                'signal': Stimuli.NecroDancerBar,
                'signal_for': 3000,
                'stimulus': Stimuli.Gabor,
                'target': 'B',
                'trial_type': Trials.ProgressBarResponseSignal
            },
            {
                'condition': 0,
                'fixation_duration': 0,
                'feedback_texts': {
                    'Correct':'Pass',
                    'Incorrect':'Fail','Fast':'Fail','Slow':'Fail','Censored':'Fail'
                },
                'gabor_contrast': 1.00,
                'gabor_ori': 355,
                'signal': Stimuli.NecroDancerBar,
                'signal_for': 3000,
                'stimulus': Stimuli.Gabor,
                'target': 'A',
                'trial_type': Trials.ProgressBarResponseSignal
            }
        ];

        const RS_BLOCK = {
            'blockwise':        RS_BLOCKWISE,
            'trialwise':        RS_TRIALWISE,
            'additional':       RS_ADDITIONAL,
            'conditional':      RS_CONDITIONAL,
            'attention':        RS_ATTENTION,
            'trial_reps':       2,
            'start_slide':      null,
            'end_slide':        null,
            'add_countdown':    true
        };

        // slides

        const _keyboard = new Slides.Slide([
            {'class': 'text','text': 'EXAMPLE EXPERIMENT','y': 0.25},
            {'class': 'text', 'text': '~tomJS.keyboard.key~', 'upper': true},
            {'class': 'text', 'text': 'Press F and J at the same time to continue.', 'y': 0.75}
        ]);

        const _end_block = new Slides.EndBlock([
            { 'class': 'text', 'text': 'End of block. Please take a short break.', 'y': 0.25 },
            { 'class': 'text', 'text': 'Your accuracy was great!', 'y': 0.48, 'conditions': ['~this.data.accuracy~ >= 80'] },
            { 'class': 'text', 'text': 'Your accuracy was good.', 'y': 0.48, 'conditions': ['~this.data.accuracy~ < 80', '~this.data.accuracy~ >= 60'] },
            { 'class': 'text', 'text': 'Your accuracy needs improvement.', 'y': 0.48, 'conditions': ['~this.data.accuracy~ < 60'] },
            { 'class': 'text', 'text': 'Your timing was great!', 'y': 0.52, 'conditions': ['~this.data.hits~ >= 80'] },
            { 'class': 'text', 'text': 'Your timing was good.', 'y': 0.52, 'conditions': ['~this.data.hits~ < 80', '~this.data.hits~ >= 60'] },
            { 'class': 'text', 'text': 'Your timing needs improvement.', 'y': 0.52, 'conditions': ['~this.data.hits~ < 60'] },
            { 'class': 'text', 'text': 'Press F and J at the same time to continue.', 'y': 0.75 },
        ]);

        const _end_exp = new Slides.EndExperiment([
            { 'class': 'text', 'text': 'End of Experiment. Thank you for your help.', 'y': 0.25 },
            { 'class': 'text', 'text': 'You were correct on ~this.data.accuracy~% of all test trials.', 'y': 0.48 },
            { 'class': 'text', 'text': 'You responded on time on ~this.data.hits~% of all test trials.', 'y': 0.52 },
            { 'class': 'text', 'text': 'Press F and J at the same time to end the experiment.', 'y': 0.75 },
        ]);

        // timeline

        tomJS.appendToTimeline(_keyboard);

        tomJS.appendCounterbalancedBlocks(
            A = FR_BLOCK,
            B = RS_BLOCK,
            blocks = 26
        );

        tomJS.appendToTimeline(_end_exp);

        tomJS.start();

    </script>
</body>
</html>
