
<!DOCTYPE html>
<html>
<body>
    <script src="jatos.js" id="jatos"></script>
    <script src="tomJS.js" id="tomJS"></script>
    <script>
        
        const args = {
            'fullscreen': true,
            'gridlines': false,
            'verbose': true,
            'show_time' : false,
        };

        const tomJS = new Experiment(args);

        if (jatos.constructor != HTMLScriptElement) jatos.onConnected(() => { tomJS.connectToJatos(false) });

        // constants

        const TRIALTYPE = Trials.ProgressBarResponseSignal;

        const BLOCKWISE = {};

        const TRIALWISE = {
            'condition': [0, 200, 400, 600, 800, 1600],
            'gabor_contrast': [0.03, 0.50],
            'gabor_ori': [2, 358]
        };

        const ADDITIONAL = {            
            'stimulus': Stimuli.Gabor,
            'iti_duration': [650, 750, 850],
            'signal': Stimuli.NecroDancerBar,
            'signal_for': 300
        };

        const CONDITIONAL = [
            'if (gabor_ori == 358) target = A',
            'if (gabor_ori == 3) target = B',
            'if (condition == 0) fixation_duration = 2000',
            'if (condition == 200) fixation_duration = 1800',
            'if (condition == 400) fixation_duration = 1600',
            'if (condition == 600) fixation_duration = 1400',
            'if (condition == 800) fixation_duration = 1200',
            'if (condition == 1600) fixation_duration = 400'
        ];

        const ATTENTION = [
            {
                'condition': 0,
                'fixation_duration': 300,
                'feedback_texts': {
                    'Correct': 'Pass',
                    'Incorrect':'Fail','Fast':'Fail','Slow':'Fail','Censored':'Fail'
                },
                'gabor_contrast': 1.00,
                'gabor_ori': 5,
                'signal': Stimuli.NecroDancerBar,
                'signal_for': 2000,
                'stimulus': Stimuli.Gabor,
                'target': 'B'
            },
            {
                'condition': 0,
                'fixation_duration': 300,
                'feedback_texts': {
                    'Correct':'Pass',
                    'Incorrect':'Fail','Fast':'Fail','Slow':'Fail','Censored':'Fail'
                },
                'gabor_contrast': 1.00,
                'gabor_ori': 355,
                'signal': Stimuli.NecroDancerBar,
                'signal_for': 2000,
                'stimulus': Stimuli.Gabor,
                'target': 'A'
            }
        ];

        const BLOCKREPS = 4;

        const TRIALREPS = 1;

        const ADDCOUNTDOWN = true;

        // slides

        const _keyboard = new Slides.Slide([
            {'class': 'text','text': 'EXAMPLE EXPERIMENT','y': 0.25},
            {'class': 'text', 'text': '~tomJS.keyboard.key~', 'upper': true},
            {'class': 'text', 'text': 'Press F and J at the same time to continue.', 'y': 0.75}
        ]);

        const _end_block = new Slides.EndBlock([
            { 'class': 'text', 'text': 'End of block. Please take a short break.', 'y': 0.25 },
            { 'class': 'text', 'text': 'Your accuracy was great!', 'y': 0.48, 'conditions': ['~this.data.accuracy~ >= 80'] },
            { 'class': 'text', 'text': 'Your accuracy was good.', 'y': 0.48, 'conditions': ['~this.data.accuracy~ < 80', '~this.data.accuracy~ >= 60'] },
            { 'class': 'text', 'text': 'Your accuracy needs improvement.', 'y': 0.48, 'conditions': ['~this.data.accuracy~ < 60'] },
            { 'class': 'text', 'text': 'Your timing was great!', 'y': 0.52, 'conditions': ['~this.data.hits~ >= 80'] },
            { 'class': 'text', 'text': 'Your timing was good.', 'y': 0.52, 'conditions': ['~this.data.hits~ < 80', '~this.data.hits~ >= 60'] },
            { 'class': 'text', 'text': 'Your timing needs improvement.', 'y': 0.52, 'conditions': ['~this.data.hits~ < 60'] },
            { 'class': 'text', 'text': 'Press F and J at the same time to continue.', 'y': 0.75 },
        ]);

        const _end_exp = new Slides.EndExperiment([
            { 'class': 'text', 'text': 'End of Experiment. Thank you for your help.', 'y': 0.25 },
            { 'class': 'text', 'text': 'You were correct on ~this.data.accuracy~% of all test trials.', 'y': 0.48 },
            { 'class': 'text', 'text': 'You responded on time on ~this.data.hits~% of all test trials.', 'y': 0.52 },
            { 'class': 'text', 'text': 'Press F and J at the same time to end the experiment.', 'y': 0.75 },
        ]);

        // timeline

        tomJS.appendToTimeline(_keyboard);

        tomJS.appendBlocks(
            trial_type = TRIALTYPE,
            blockwise = BLOCKWISE,
            trialwise = TRIALWISE,
            additional = ADDITIONAL,
            conditional = CONDITIONAL,
            attention = ATTENTION,
            block_reps = BLOCKREPS,
            trial_reps = TRIALREPS,
            start_slide = null,
            end_slide = _end_block,
            add_countdown = ADDCOUNTDOWN
        );

        tomJS.appendToTimeline(_end_exp);

        tomJS.start();

    </script>
</body>
</html>
